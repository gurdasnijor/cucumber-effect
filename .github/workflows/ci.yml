name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

  effect-diagnostics:
    name: Effect diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Effect diagnostics
        run: pnpm run diagnostics

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Test
        run: pnpm run test
